name: Refresh Signals

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger from GitHub UI
  push:
    branches: [main]          # keeps workflow active on any commit

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger signal refresh
        run: |
          response=$(curl -s -X POST https://finsight-vmas.vercel.app/api/refresh)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"' || (echo "Refresh failed!" && exit 1)
